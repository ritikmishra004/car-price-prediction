<!DOCTYPE html>
<html>
<head>
<title>Car Price Predictor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Car Price Prediction</h1>

<input id="brand" placeholder="Brand">

<select id="fuel">
<option>Petrol</option>
<option>Diesel</option>
<option>CNG</option>
<option>LPG</option>
</select>

<select id="seller">
<option>Individual</option>
<option>Dealer</option>
<option>Trustmark Dealer</option>
</select>

<select id="transmission">
<option>Manual</option>
<option>Automatic</option>
</select>

<select id="owner">
<option>First Owner</option>
<option>Second Owner</option>
<option>Third Owner</option>
<option>Fourth & Above Owner</option>
</select>

<input id="km" type="number" placeholder="KM Driven">

<input id="age" type="number" placeholder="Car Age">

<button onclick="predict()">Predict Price</button>

<h2 id="result"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
